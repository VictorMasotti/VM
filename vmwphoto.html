<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Globe Display</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      cursor: url('EARTH2.png'), auto !important;
    }
    body {
      background: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }
    .top {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    canvas { display: block; }
    .content {
      height: 10vh;
      flex-shrink: 0;
      transition: background-color 0.4s ease;
      position: relative;
    }
    .forest-text {
      position: absolute;
      bottom: 7px;
      left: 10px;
      font-size: 7px;
      color: rgba(255,255,255,0.45);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.04em;
      line-height: 1.5;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.4s ease;
      max-width: 60vw;
    }
    .forest-text.fade { opacity: 0; }
  </style>
</head>
<body>

<div class="top">
  <canvas id="bgGrid" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>
  <canvas id="globe" style="position:relative;z-index:1;"></canvas>
</div>
<div class="content" id="colorBox"><span class="forest-text" id="forestText"></span></div>
<canvas id="extrudeCanvas" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:50;"></canvas>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const images = [
  '1771697824220_cak.jpg','1771697824221_cal.jpg','1771697824221_cam.jpg',
  '1771697824221_can.jpg','1771697824221_cek.jpg','1771697824222_cel.jpg',
  '1771697824222_cem.jpg','1771697824222_cen.jpg','1771697824222_cil.jpg',
  '1771697824223_cim.jpg','1771697824223_cin.jpg','1771697824223_col.jpg',
  '1771697824223_com.jpg','1771697824223_cul.jpg','1771697824224_cum.jpg',
  '1771697824224_cun.jpg',
];
const shuffled = [...images].sort(() => Math.random() - 0.5);

function randomBlue() {
  return `rgb(${Math.floor(Math.random()*30)},${Math.floor(Math.random()*80+20)},${Math.floor(Math.random()*120+135)})`;
}

const box = document.getElementById('colorBox');
box.style.backgroundColor = randomBlue();

// ── GLOBE SETUP ───────────────────────────────────────────────────────
const canvas = document.getElementById('globe');
const ctx = canvas.getContext('2d');
const ROWS = 18, COLS = 36;
const R_FACTOR = 0.44;

const cellImages = [];
for (let r = 0; r < ROWS; r++) {
  cellImages[r] = [];
  for (let c = 0; c < COLS; c++) cellImages[r][c] = shuffled[(r*COLS+c) % shuffled.length];
}

function randomCellColor() {
  const t = Math.random();
  return { r: Math.round(50+(0-50)*t), g: Math.round(205+(119-205)*t), b: Math.round(50+(255-50)*t) };
}
const cellColors = [];
for (let r = 0; r < ROWS; r++) { cellColors[r]=[]; for(let c=0;c<COLS;c++) cellColors[r][c]=randomCellColor(); }

// Face cache for extrude animation — declared before drawGlobe uses it
const lastFaceMap = {};

let pressedCell = null;
let rotY = 0, rotX = 0;
let isDragging = false, lastX = 0, lastY = 0, velX = 0, velY = 0, dragMoved = false;

function resize() {
  const size = Math.min(window.innerWidth*0.8, window.innerHeight*0.84);
  canvas.width = size; canvas.height = size;
}
resize();
window.addEventListener('resize', resize);

function rotate3D(x, y, z) {
  const cosX=Math.cos(rotX), sinX=Math.sin(rotX);
  const y1=y*cosX-z*sinX, z1=y*sinX+z*cosX;
  const cosY=Math.cos(rotY), sinY=Math.sin(rotY);
  const x2=x*cosY+z1*sinY, z2=-x*sinY+z1*cosY;
  return {x:x2, y:y1, z:z2};
}
function latLonTo3D(lat, lon) {
  return { x:Math.cos(lat)*Math.sin(lon), y:Math.sin(lat), z:Math.cos(lat)*Math.cos(lon) };
}
function project(p, cx, cy, R) {
  const persp=3.5, scale=persp/(persp+p.z*0.4);
  return { sx:cx+p.x*R*scale, sy:cy-p.y*R*scale, z:p.z };
}

function shadeRgb(col, light, pressed, latM) {
  const factor = pressed ? Math.max(0.2, light*0.6) : 0.35+light*0.72;
  let r=Math.round(col.r*factor), g=Math.round(col.g*factor), b=Math.round(col.b*factor);
  const poleBase = Math.pow(Math.abs(latM)/(Math.PI/2), 1.8)*0.88;
  const noise = 0.5+0.5*Math.sin(col.r*7.3+col.b*3.1);
  const poleFactor = poleBase*(0.6+0.4*noise);
  r=Math.round(r+(255-r)*poleFactor); g=Math.round(g+(255-g)*poleFactor); b=Math.round(b+(255-b)*poleFactor);
  return `rgb(${r},${g},${b})`;
}

function drawGlobe() {
  const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2, R=W*R_FACTOR;
  ctx.clearRect(0,0,W,H);

  // Shadow
  const sg=ctx.createRadialGradient(cx+R*0.12,cy+R*0.12,R*0.05,cx,cy,R*1.15);
  sg.addColorStop(0,'rgba(0,0,0,0.2)'); sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(cx+R*0.1,cy+R*0.1,R,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill();

  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();

  const faces=[];
  for (let ri=0;ri<ROWS;ri++) {
    for (let ci=0;ci<COLS;ci++) {
      const lat0=Math.PI/2-(ri/ROWS)*Math.PI, lat1=Math.PI/2-((ri+1)/ROWS)*Math.PI;
      const lon0=(ci/COLS)*2*Math.PI-Math.PI, lon1=((ci+1)/COLS)*2*Math.PI-Math.PI;
      const latM=(lat0+lat1)/2, lonM=(lon0+lon1)/2;
      const raw=latLonTo3D(latM,lonM), rot=rotate3D(raw.x,raw.y,raw.z);
      if (rot.z<-0.08) continue;
      const isPressed=pressedCell&&pressedCell.row===ri&&pressedCell.col===ci;
      const light=Math.max(0,rot.z);
      const pts=[[lat0,lon0],[lat0,lon1],[lat1,lon1],[lat1,lon0]].map(([la,lo])=>{
        const r0=latLonTo3D(la,lo), r3=rotate3D(r0.x,r0.y,r0.z);
        if (isPressed){r3.x*=0.88;r3.y*=0.88;r3.z*=0.88;}
        return project(r3,cx,cy,R);
      });
      // Store in face cache for extrude
      lastFaceMap[`${ri}_${ci}`] = { pts };
      faces.push({ri,ci,pts,light,z:rot.z,isPressed,col:cellColors[ri][ci],latM});
    }
  }
  faces.sort((a,b)=>a.z-b.z);

  for (const face of faces) {
    const {pts,light,isPressed,col,latM}=face;
    ctx.beginPath(); ctx.moveTo(pts[0].sx,pts[0].sy);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].sx,pts[i].sy);
    ctx.closePath();
    ctx.fillStyle=shadeRgb(col,light,isPressed,latM); ctx.fill();
    ctx.strokeStyle=isPressed?'rgba(255,255,255,0.7)':'rgba(62,28,8,0.78)';
    ctx.lineWidth=isPressed?1.8:0.9; ctx.stroke();
    if(isPressed){ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fill();}
  }

  // Sand spots
  const sandSpots=[
    {lat:0.18,lon:0.9},{lat:-0.3,lon:2.1},{lat:0.5,lon:-1.4},{lat:-0.1,lon:-0.3},
    {lat:0.35,lon:3.8},{lat:-0.45,lon:1.1},{lat:0.05,lon:-2.9},{lat:0.6,lon:5.1},
    {lat:-0.2,lon:-4.2},{lat:0.25,lon:4.5},{lat:-0.55,lon:-1.9},{lat:0.42,lon:2.7},
    {lat:-0.08,lon:0.3},{lat:0.15,lon:-3.6},{lat:-0.38,lon:3.0},
  ];
  for (const sp of sandSpots) {
    const r0=latLonTo3D(sp.lat,sp.lon), r3=rotate3D(r0.x,r0.y,r0.z);
    if(r3.z<0.05) continue;
    const proj=project(r3,cx,cy,R);
    const spotR=R*(0.05+Math.abs(Math.sin(sp.lon*3.1))*0.06);
    const lf=Math.max(0,r3.z);
    const grad=ctx.createRadialGradient(proj.sx,proj.sy,0,proj.sx,proj.sy,spotR);
    grad.addColorStop(0,`rgba(194,154,100,${0.55*lf})`);
    grad.addColorStop(0.45,`rgba(194,154,100,${0.28*lf})`);
    grad.addColorStop(1,`rgba(194,154,100,0)`);
    ctx.beginPath();
    ctx.ellipse(proj.sx,proj.sy,spotR,spotR*(0.6+Math.abs(Math.cos(sp.lon))*0.4),sp.lon*0.4,0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();
  }

  // Shine
  const shine=ctx.createRadialGradient(cx-R*0.28,cy-R*0.3,R*0.04,cx-R*0.08,cy-R*0.1,R);
  shine.addColorStop(0,'rgba(255,255,255,0.32)'); shine.addColorStop(0.45,'rgba(255,255,255,0.04)'); shine.addColorStop(1,'rgba(0,0,0,0.28)');
  ctx.fillStyle=shine; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(80,160,255,0.35)'; ctx.lineWidth=1.5; ctx.stroke();
}

// ── HIT TEST ─────────────────────────────────────────────────────────
function hitTest(mx,my) {
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,R=W*R_FACTOR;
  const dx=mx-cx,dy=cy-my;
  if(Math.hypot(dx,dy)>R) return null;
  const nx=dx/R,ny=dy/R,nz2=1-nx*nx-ny*ny;
  if(nz2<0) return null;
  const nz=Math.sqrt(nz2);
  const cosX=Math.cos(-rotX),sinX=Math.sin(-rotX),cosY=Math.cos(-rotY),sinY=Math.sin(-rotY);
  const x1=nx*cosY+nz*sinY,z1=-nx*sinY+nz*cosY;
  const y2=ny*cosX-z1*sinX,z2=ny*sinX+z1*cosX;
  const lat=Math.asin(Math.max(-1,Math.min(1,y2)));
  const lon=Math.atan2(x1,z2);
  const ri=Math.floor((Math.PI/2-lat)/Math.PI*ROWS);
  const ci=Math.floor(((lon+Math.PI)/(2*Math.PI))*COLS);
  return {row:Math.max(0,Math.min(ROWS-1,ri)),col:Math.max(0,Math.min(COLS-1,ci))};
}

// ── DRAG CONTROLS ────────────────────────────────────────────────────
canvas.addEventListener('wheel',e=>{e.preventDefault();rotY-=e.deltaX*0.008;rotX-=e.deltaY*0.008;},{passive:false});

let mouseDownX = 0, mouseDownY = 0;

canvas.addEventListener('mousedown', e => {
  isDragging = true; dragMoved = false;
  lastX = e.clientX; lastY = e.clientY;
  mouseDownX = e.clientX; mouseDownY = e.clientY;
  velX = 0; velY = 0;
  const rect = canvas.getBoundingClientRect();
  pressedCell = hitTest(e.clientX - rect.left, e.clientY - rect.top);
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  if (Math.abs(e.clientX - mouseDownX) > 4 || Math.abs(e.clientY - mouseDownY) > 4) dragMoved = true;
  velX = dx * 0.012; velY = dy * 0.012;
  rotY -= velX; rotX -= velY;
  lastX = e.clientX; lastY = e.clientY;
});

window.addEventListener('mouseup', e => {
  if (!isDragging) return;
  isDragging = false;
  if (!dragMoved && pressedCell) {
    showImage(pressedCell.row, pressedCell.col);
  }
  pressedCell = null;
  velX *= 0.3; velY *= 0.3;
});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();isDragging=true;dragMoved=false;
  lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;velX=0;velY=0;
  const rect=canvas.getBoundingClientRect();
  const cell=hitTest(lastX-rect.left,lastY-rect.top);
  if(cell) pressedCell=cell;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();if(!isDragging)return;
  const dx=e.touches[0].clientX-lastX,dy=e.touches[0].clientY-lastY;
  if(Math.abs(dx)>2||Math.abs(dy)>2) dragMoved=true;
  velX=dx*0.012;velY=dy*0.012;rotY-=velX;rotX-=velY;
  lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
  if(dragMoved) pressedCell=null;
},{passive:false});
canvas.addEventListener('touchend',e=>{
  isDragging=false;
  if(!dragMoved&&e.changedTouches.length>0){
    const rect=canvas.getBoundingClientRect();
    const cell=hitTest(e.changedTouches[0].clientX-rect.left,e.changedTouches[0].clientY-rect.top);
    if(cell) showImage(cell.row,cell.col);
  }
  setTimeout(()=>{pressedCell=null;},200);
  velX*=0.3;velY*=0.3;
});

// ── MAIN LOOP ────────────────────────────────────────────────────────
function animate() {
  if(!isDragging){rotY+=velX;rotX+=velY;velX*=0.88;velY*=0.88;if(Math.abs(velX)<0.0001)velX=0;if(Math.abs(velY)<0.0001)velY=0;}
  drawGlobe();
  requestAnimationFrame(animate);
}
animate();

// ── EXTRUDE + ZOOM ANIMATION ─────────────────────────────────────────
const extrudeCanvas = document.getElementById('extrudeCanvas');
const extCtx = extrudeCanvas.getContext('2d');
let extState = null;

function resizeExtrude(){extrudeCanvas.width=window.innerWidth;extrudeCanvas.height=window.innerHeight;}
resizeExtrude();
window.addEventListener('resize',resizeExtrude);

function lerp(a,b,t){return a+(b-a)*t;}
function easeOut(t){return 1-Math.pow(1-t,3);}

function showImage(row, col) {
  if (extState && extState.active) { revertExtrude(); return; }
  const faceData = lastFaceMap[`${row}_${col}`];
  if (!faceData) return;

  const pts = faceData.pts;
  // get the canvas offset so coords are in screen space
  const canvasRect = canvas.getBoundingClientRect();
  const offX = canvasRect.left;
  const offY = canvasRect.top;

  // origin = the actual 4 screen corners of the pressed cell
  const origin = pts.map(p => ({ x: p.sx + offX, y: p.sy + offY }));

  const img = new Image();
  img.onload = () => {
    const targetW = window.innerWidth * 0.67;
    const targetH = targetW * (img.naturalHeight / img.naturalWidth);
    extState = {
      active: true, img,
      origin,   // 4 corners of cell in screen coords
      targetX: 0, targetY: 0, targetW, targetH,
      startTime: performance.now(),
      duration: 1100,
    };
    extrudeCanvas.style.pointerEvents = 'all';
    box.style.backgroundColor = randomBlue();
  };
  img.src = cellImages[row][col];
}

function revertExtrude() {
  if (!extState) return;
  // animate back
  extState.reverting = true;
  extState.revertStart = performance.now();
  extState.revertDuration = 600;
  extrudeCanvas.style.pointerEvents = 'none';
}
extrudeCanvas.addEventListener('click', revertExtrude);

function drawExtrude() {
  extCtx.clearRect(0, 0, extrudeCanvas.width, extrudeCanvas.height);
  if (!extState || !extState.active) { requestAnimationFrame(drawExtrude); return; }

  const s = extState;
  let t;
  if (s.reverting) {
    const rt = Math.min((performance.now() - s.revertStart) / s.revertDuration, 1);
    t = 1 - easeOut(rt);
    if (rt >= 1) { extState = null; requestAnimationFrame(drawExtrude); return; }
  } else {
    t = Math.min((performance.now() - s.startTime) / s.duration, 1);
    t = easeOut(t);
  }

  // Target rect corners (top-left aligned rectangle)
  const tX = s.targetX, tY = s.targetY, tW = s.targetW, tH = s.targetH;
  const target = [
    { x: tX,     y: tY },
    { x: tX+tW,  y: tY },
    { x: tX+tW,  y: tY+tH },
    { x: tX,     y: tY+tH },
  ];

  // Interpolate each of the 4 corners: origin cell → target rect
  const cur = s.origin.map((o, i) => ({
    x: lerp(o.x, target[i].x, t),
    y: lerp(o.y, target[i].y, t),
  }));

  // Draw as a perspective quad (trapezoid → rect morph)
  // use clip to the quad shape, then draw image inside it
  extCtx.save();
  extCtx.beginPath();
  extCtx.moveTo(cur[0].x, cur[0].y);
  extCtx.lineTo(cur[1].x, cur[1].y);
  extCtx.lineTo(cur[2].x, cur[2].y);
  extCtx.lineTo(cur[3].x, cur[3].y);
  extCtx.closePath();
  extCtx.clip();

  // Draw image stretched into the quad using transform
  // Map image rect into the quad via a rough bounding box
  const minX = Math.min(...cur.map(p => p.x));
  const minY = Math.min(...cur.map(p => p.y));
  const maxX = Math.max(...cur.map(p => p.x));
  const maxY = Math.max(...cur.map(p => p.y));
  extCtx.globalAlpha = 0.15 + t * 0.85;
  extCtx.drawImage(s.img, minX, minY, maxX - minX, maxY - minY);
  extCtx.restore();

  // Draw the quad outline — the "extruded shape" border
  extCtx.save();
  extCtx.globalAlpha = Math.min(1, (1 - t) * 3 + 0.1);
  extCtx.strokeStyle = '#000';
  extCtx.lineWidth = 1.5;
  extCtx.beginPath();
  extCtx.moveTo(cur[0].x, cur[0].y);
  extCtx.lineTo(cur[1].x, cur[1].y);
  extCtx.lineTo(cur[2].x, cur[2].y);
  extCtx.lineTo(cur[3].x, cur[3].y);
  extCtx.closePath();
  extCtx.stroke();

  // Corner lines from origin cell to current corners (visible during morph)
  if (t < 0.7) {
    extCtx.globalAlpha = (1 - t / 0.7) * 0.45;
    extCtx.lineWidth = 0.7;
    for (let i = 0; i < 4; i++) {
      extCtx.beginPath();
      extCtx.moveTo(s.origin[i].x, s.origin[i].y);
      extCtx.lineTo(cur[i].x, cur[i].y);
      extCtx.stroke();
    }
  }
  extCtx.restore();

  requestAnimationFrame(drawExtrude);
}
requestAnimationFrame(drawExtrude);

// ── FOREST TEXT ───────────────────────────────────────────────────────
const forestLines=[
  "the oldest trees in the boreal forest have been standing since before the printing press.",
  "a single hectare of old-growth forest stores more carbon than most cities emit in a year.",
  "mycorrhizal networks beneath the soil connect trees across hundreds of metres — the wood wide web.",
  "in the amazon, trees release water vapour that forms rivers of cloud drifting inland for thousands of kilometres.",
  "beech forests shed their leaves each autumn to protect roots from frost — a ritual 10 million years old.",
  "the silence inside a dense pine forest is not absence of sound — it is the forest absorbing it.",
  "a fallen tree in a temperate rainforest can take 500 years to fully return to soil.",
  "some japanese cedar forests have been tended by the same families for thirty generations.",
  "trees communicate drought stress to neighbours through root-sharing fungal threads below the surface.",
  "the amazon basin contains roughly one third of all species living on land.",
  "a mature oak can support over 500 different species of insect across its lifetime.",
  "redwood forests trap coastal fog and convert it to freshwater, feeding streams that would otherwise run dry.",
];
const forestEl=document.getElementById('forestText');
let forestIdx=Math.floor(Math.random()*forestLines.length);
forestEl.textContent=forestLines[forestIdx];
setInterval(()=>{
  forestEl.classList.add('fade');
  setTimeout(()=>{forestIdx=(forestIdx+1)%forestLines.length;forestEl.textContent=forestLines[forestIdx];forestEl.classList.remove('fade');},400);
},2000);

// ── BG GRID ───────────────────────────────────────────────────────────
const bgCanvas=document.getElementById('bgGrid');
const bgCtx=bgCanvas.getContext('2d');
const CELL=50;
let bgAnim={t:0,phase:'in',restTimer:0};
const IN_DUR=1200,OUT_DUR=900,REST_MIN=1000,REST_MAX=4000;

function initBgGrid(){bgCanvas.width=bgCanvas.offsetWidth;bgCanvas.height=bgCanvas.offsetHeight;}
let lastBgT=performance.now();
function drawBgGrid(now){
  const dt=Math.min(now-lastBgT,50);lastBgT=now;
  const w=bgCanvas.width,h=bgCanvas.height;
  bgCtx.clearRect(0,0,w,h);
  const a=bgAnim;
  if(a.phase==='rest'){a.restTimer-=dt;if(a.restTimer<=0){a.phase='in';a.t=0;}requestAnimationFrame(drawBgGrid);return;}
  if(a.phase==='in'){a.t+=dt/IN_DUR;if(a.t>=1){a.t=1;a.phase='out';}}
  else if(a.phase==='out'){a.t-=dt/OUT_DUR;if(a.t<=0){a.t=0;a.phase='rest';a.restTimer=REST_MIN+Math.random()*(REST_MAX-REST_MIN);}}
  const alpha=Math.min(1,a.t<0.5?a.t*2:(1-a.t)*2)*0.92;
  const weight=1+a.t*26;
  const zoneW=w*0.52;
  const cols=Math.floor(zoneW/CELL),rows=Math.floor(h/CELL);
  bgCtx.save();
  bgCtx.globalAlpha=alpha;
  bgCtx.strokeStyle='#000';
  bgCtx.lineWidth=weight;
  bgCtx.lineJoin='miter';
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) bgCtx.strokeRect(c*CELL,r*CELL,CELL,CELL);
  bgCtx.restore();
  requestAnimationFrame(drawBgGrid);
}
initBgGrid();
window.addEventListener('resize',initBgGrid);
requestAnimationFrame(drawBgGrid);

// ── YELLOW FLASH ─────────────────────────────────────────────────────
let yellowBase=null;
function scheduleYellow(){
  setTimeout(()=>{
    yellowBase=box.style.backgroundColor;
    box.style.transition='background-color 0.08s ease';
    box.style.backgroundColor='#FFE600';
    setTimeout(()=>{box.style.transition='background-color 0.5s ease';box.style.backgroundColor=yellowBase||randomBlue();scheduleYellow();},180);
  },12000+Math.random()*6000);
}
scheduleYellow();
</script>
</body>
</html>
